<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>每日勉勵</title>

  <style>
    body {
      text-align: center;
      padding: 50px;
      background: #fff5fa;
      font-family: Arial;
    }

    .box {
      background: white;
      padding: 30px;
      border-radius: 20px;
      font-size: 22px;
    }

    button {
      margin-top: 30px;
      padding: 15px 30px;
      border-radius: 30px;
      border: none;
      background: #f4a7c5;
      color: white;
      font-size: 18px;
    }
  </style>

</head>

<body>

<h1>🌷 今日勉勵</h1>

<div class="box" id="message">
今天也辛苦了，你已經做得很好了 ✨
</div>

<button onclick="changeMessage()">
換一句 💗
</button>


<script>

function changeMessage(){

const messages = [
"不要急，你有自己的節奏 🌸",
"今天也要好好照顧自己 💗",
"你的努力一定會開花結果 ✨",
"慢慢來，你正在變得更好 🌷",
"相信自己，你真的很棒 🌙"
];


let random = Math.floor(Math.random() * messages.length);

document.getElementById("message").innerHTML = messages[random];

}

</script>

</body>
</html>
