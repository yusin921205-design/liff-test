<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#fff5fa">
  <title>今日勉勵</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #3c3038;
      --muted: #82727c;
      --pink: #ef6f9f;
      --pink-dark: #d94d84;
      --surface: rgba(255, 255, 255, .82);
    }

    * { box-sizing: border-box; }

    html { min-height: 100%; }

    body {
      min-height: 100vh;
      min-height: 100svh;
      margin: 0;
      padding: clamp(16px, 4vw, 42px);
      display: grid;
      place-items: center;
      overflow-x: hidden;
      color: var(--ink);
      font-family: Inter, "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
      background:
        radial-gradient(circle at 12% 16%, rgba(255, 177, 211, .42), transparent 23rem),
        radial-gradient(circle at 88% 82%, rgba(210, 197, 255, .32), transparent 26rem),
        linear-gradient(145deg, #fffafc, #fff0f7 52%, #f8f5ff);
    }

    body::before,
    body::after {
      content: "✦";
      position: fixed;
      z-index: -1;
      color: rgba(239, 111, 159, .16);
      font-size: clamp(90px, 14vw, 180px);
      line-height: 1;
      pointer-events: none;
    }

    body::before { top: 4%; left: 3%; transform: rotate(14deg); }
    body::after { right: 4%; bottom: 1%; transform: rotate(-10deg); }

    main {
      width: min(100%, 720px);
      padding: clamp(26px, 5.5vw, 52px);
      text-align: center;
      border: 1px solid rgba(255, 255, 255, .92);
      border-radius: clamp(28px, 5vw, 44px);
      background: var(--surface);
      box-shadow: 0 26px 75px rgba(114, 67, 92, .17);
      backdrop-filter: blur(16px);
    }

    .eyebrow {
      margin: 0 0 8px;
      color: var(--pink-dark);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: .22em;
    }

    h1 {
      margin: 0;
      font-size: clamp(34px, 7vw, 52px);
      line-height: 1.18;
      letter-spacing: -.04em;
    }

    .subtitle {
      margin: 12px auto 0;
      color: var(--muted);
      font-size: clamp(14px, 2.7vw, 17px);
      line-height: 1.65;
    }

    .message-card {
      position: relative;
      min-height: clamp(180px, 30vw, 245px);
      margin: clamp(24px, 5vw, 38px) 0 24px;
      padding: clamp(34px, 7vw, 54px) clamp(24px, 7vw, 58px);
      display: grid;
      place-items: center;
      overflow: hidden;
      border: 1px solid rgba(239, 111, 159, .14);
      border-radius: clamp(24px, 4vw, 34px);
      background:
        linear-gradient(145deg, rgba(255,255,255,.98), rgba(255,247,251,.94));
      box-shadow:
        0 16px 40px rgba(110, 65, 88, .1),
        inset 0 1px 0 #fff;
    }

    .message-card::before,
    .message-card::after {
      position: absolute;
      color: rgba(239, 111, 159, .17);
      font-family: Georgia, serif;
      font-size: clamp(64px, 13vw, 110px);
      font-weight: 700;
      line-height: 1;
      pointer-events: none;
    }

    .message-card::before { content: "“"; top: 10px; left: 20px; }
    .message-card::after { content: "”"; right: 20px; bottom: -26px; }

    #message {
      position: relative;
      z-index: 1;
      margin: 0;
      max-width: 560px;
      font-size: clamp(22px, 4.6vw, 31px);
      font-weight: 750;
      line-height: 1.65;
      letter-spacing: .01em;
      text-wrap: balance;
      overflow-wrap: anywhere;
      transition: opacity .18s ease, transform .18s ease;
    }

    #message.is-changing {
      opacity: 0;
      transform: translateY(8px);
    }

    button {
      min-width: min(100%, 230px);
      min-height: 56px;
      padding: 14px 30px;
      border: 0;
      border-radius: 999px;
      color: #fff;
      background: linear-gradient(135deg, #f58bb2, var(--pink-dark));
      box-shadow: 0 12px 26px rgba(217, 77, 132, .28);
      font: inherit;
      font-size: clamp(16px, 3vw, 19px);
      font-weight: 850;
      letter-spacing: .03em;
      cursor: pointer;
      transition: transform .2s ease, box-shadow .2s ease, opacity .2s ease;
      -webkit-tap-highlight-color: transparent;
    }

    button:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 16px 32px rgba(217, 77, 132, .34);
    }

    button:active:not(:disabled) { transform: translateY(1px) scale(.99); }
    button:disabled { cursor: wait; opacity: .72; }
    button:focus-visible { outline: 4px solid rgba(239, 111, 159, .24); outline-offset: 4px; }

    .hint {
      margin: 18px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    @media (max-width: 480px) {
      body { padding: 12px; }
      main {
        padding: 26px 18px 28px;
        border-radius: 28px;
      }
      .message-card {
        min-height: 190px;
        margin-block: 22px 20px;
        padding: 38px 20px;
        border-radius: 24px;
      }
      #message { font-size: clamp(21px, 6.3vw, 26px); }
      button { width: min(100%, 250px); }
    }

    @media (max-height: 650px) and (min-width: 520px) {
      body { place-items: start center; padding-block: 16px; }
      main { padding-block: 24px; }
      .message-card { min-height: 150px; margin-block: 18px; padding-block: 28px; }
      .subtitle, .hint { display: none; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { transition-duration: .01ms !important; }
    }
  </style>
</head>
<body>
  <main>
    <p class="eyebrow">A NOTE FOR TODAY</p>
    <h1>🌷 今日勉勵</h1>
    <p class="subtitle">送給此刻的你，一句溫柔但有力量的話。</p>

    <section class="message-card" aria-label="今日勉勵內容">
      <p id="message" role="status" aria-live="polite">今天也辛苦了，你已經做得很好了 ✨</p>
    </section>

    <button id="newMessageButton" type="button">換一句勉勵 💗</button>
    <p class="hint">需要的時候，就再為自己抽一句。</p>
  </main>

  <script>
    const messages = [
      "不要急，你有自己的花期 🌸",
      "今天也辛苦了，你已經很棒了 💗",
      "慢慢來也沒關係，你正在變好 ✨",
      "累了就休息一下，再繼續前進 🌷",
      "相信自己，你比想像中勇敢 🌙",
      "不要急，你有自己的節奏 🌸",
      "今天也要好好照顧自己 💗",
      "你的努力一定會開花結果 ✨",
      "慢慢來，你正在變得更好 🌷",
      "相信自己，你真的很棒 🌙",
      "今天也有好好開始一天，這就很不錯了 🌸",
      "有些進度看不見，但它一直在發生 💐",
      "你正在慢慢建立屬於自己的節奏 🌸",
      "今天的選擇也在塑造未來的你 ✨",
      "不急著變好，先維持前進就好 🌙",
      "有時候穩定，比衝刺更重要 🌸",
      "今天能完成一件事，就已經很值得肯定 💗",
      "你比昨天多了一點成熟 ✨",
      "每一次選擇，都在累積方向感 🌸",
      "你正在學會怎麼跟生活相處 ✨",
      "今天的你，比想像中更可靠 💗",
      "不完美也可以繼續往前走 💐",
      "有些答案會在做的過程中出現 ✨",
      "你正在慢慢找到適合自己的方式 ❤️‍🩹",
      "今天也有在前進，只是比較安靜 🌙",
      "有些成長是看起來沒變，其實變很多 ❤️‍🩹",
      "你已經在自己的路上了 ❤️‍🩹",
      "今天的決定也很重要 🥰",
      "不需要一步到位，可以一步一步來 🥰",
      "你正在變得更能面對事情，超棒的 💪",
      "今天也有撐住自己的節奏 💐",
      "有些努力是默默在發生的 💪",
      "你正在建立屬於自己的安全感 💗",
      "每一天都在調整更好的方向 💪",
      "今天的你也有在進步 💗",
      "有時候慢，是因為你在思考對的路 💪",
      "今天的你已經做出選擇了，你超強的 😎",
      "你正在慢慢變得更穩定 💪",
      "不用急著證明什麼，時間會證明一切 😎",
      "你的步調是可以被尊重的 🥰",
      "今天的經驗會變成未來的底氣 💪",
      "你正在累積解決問題的能力，我以你為榮 😎",
      "有些改變是日常裡慢慢形成的 🥰",
      "今天也有在往前靠近，加油喔 💪",
      "你正在學會面對不確定 😆",
      "每一步都在讓你更清楚自己，不要放棄！😎",
      "今天也有在完成屬於你的任務 💐",
      "有些事情會越做越順 💐",
      "你正在建立自己的判斷力 😎",
      "今天的選擇也很真實，相信自己 😆",
      "你已經不再是原來的你了，已經變得更厲害了喔 ❤️‍🩹",
      "有些進步是別人看不出來的 💗",
      "今天也在慢慢變強 💪",
      "每個人都有自己的花期，不要氣餒！😎",
      "每一天都在讓你更熟悉自己 🌙",
      "今天的你比昨天更有方向感，很棒唷 😆",
      "有些事情只是還在發展中，不要著急 😆",
      "你正在變得更懂得拿捏生活 ✨",
      "今天也有在往前推進，成功離你不遠了！🥰",
      "你正在走一條屬於自己的路 💪",
      "有些成長，是回頭才看得懂的，加油 😎",
      "今天的你，已經在正確的路上了 💗"
    ];

    const message = document.getElementById("message");
    const button = document.getElementById("newMessageButton");
    const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)");
    let lastIndex = -1;

    function chooseMessage() {
      let nextIndex;
      do {
        nextIndex = Math.floor(Math.random() * messages.length);
      } while (messages.length > 1 && nextIndex === lastIndex);

      lastIndex = nextIndex;
      return messages[nextIndex];
    }

    function newMessage() {
      if (button.disabled) return;
      button.disabled = true;

      if (reduceMotion.matches) {
        message.textContent = chooseMessage();
        button.disabled = false;
        return;
      }

      message.classList.add("is-changing");
      window.setTimeout(() => {
        message.textContent = chooseMessage();
        message.classList.remove("is-changing");
        button.disabled = false;
      }, 180);
    }

    button.addEventListener("click", newMessage);
  </script>
</body>
</html>
